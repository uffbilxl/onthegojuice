<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmed – On The Go Juice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/checkout.css" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .ty-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 6vw;
    }
    .ty-card {
      background: var(--white);
      border-radius: 24px;
      padding: 60px 48px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
      animation: cardIn 0.55s cubic-bezier(0.25,1,0.5,1) forwards;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .ty-icon {
      width: 72px; height: 72px;
      background: #dcfce7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: iconPop 0.5s 0.25s cubic-bezier(0.25,1,0.5,1) both;
    }
    @keyframes iconPop { from { transform: scale(0); } to { transform: scale(1); } }
    .ty-icon svg { color: #16a34a; }
    .ty-title {
      font-family: var(--font-accent);
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
    }
    .ty-sub {
      color: var(--grey);
      font-size: 0.95rem;
      line-height: 1.65;
      margin-bottom: 32px;
    }
    .ty-order-id {
      background: var(--off-white);
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 0.85rem;
      color: var(--grey);
      margin-bottom: 28px;
    }
    .ty-order-id strong { color: var(--black); }
    .ty-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 36px;
      background: var(--green);
      color: var(--white);
      font-family: var(--font-accent);
      font-weight: 700;
      font-size: 0.95rem;
      border-radius: 999px;
      transition: background 0.2s, transform 0.15s;
    }
    .ty-btn:hover { background: var(--green-dark); transform: translateY(-2px); }
    .ty-email-note {
      font-size: 0.78rem;
      color: var(--grey);
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <header class="co-header">
    <a href="/" class="co-logo">
      <img src="images/logo.png" alt="On The Go Juice" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
      <span class="co-logo-text" style="display:none">On The Go Juice</span>
    </a>
  </header>

  <div class="ty-wrap">
    <div class="ty-card">
      <div class="ty-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h1 class="ty-title">Order Confirmed!</h1>
      <p class="ty-sub">Thank you for your order. David will be in touch shortly to confirm your delivery slot or pickup details.</p>
      <div class="ty-order-id">
        Order reference: <strong id="order-ref">#OTGJ-0001</strong>
      </div>
      <a href="/" class="ty-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Back to Shop
      </a>
      <p class="ty-email-note">A confirmation email has been sent to <span id="ty-email">your inbox</span>.</p>
    </div>
  </div>

  <script>
    // Stripe appends ?payment_intent=pi_xxx&redirect_status=succeeded to the return_url
    const params = new URLSearchParams(window.location.search);
    const paymentIntent = params.get('payment_intent');
    const redirectStatus = params.get('redirect_status');

    if (redirectStatus === 'failed') {
      document.querySelector('.ty-title').textContent = 'Payment Failed';
      document.querySelector('.ty-sub').textContent = 'Your payment was not processed. Please return to checkout and try again.';
      document.querySelector('.ty-icon').style.background = '#fee2e2';
      document.querySelector('.ty-icon svg').style.color = '#dc2626';
    }

    if (paymentIntent) {
      // Show last 8 chars of payment intent ID as order reference
      document.getElementById('order-ref').textContent = '#OTGJ-' + paymentIntent.slice(-8).toUpperCase();
    }

    const email = sessionStorage.getItem('otgj_order_email');
    if (email) document.getElementById('ty-email').textContent = email;

    // Clear cart on success
    if (!redirectStatus || redirectStatus === 'succeeded') {
      localStorage.removeItem('otgj_cart');
      sessionStorage.removeItem('otgj_order_ref');
      sessionStorage.removeItem('otgj_order_email');
    }
  </script>
</body>
</html>
